<!-- 5. Data & Streaming — stream icon -->
<rect x="600" y="170" width="130" height="55" rx="8" stroke="#444" stroke-width="1.5" fill="#fafafa"/>
<path d="M640,240 Q655,232 670,240 Q685,248 700,240" stroke="#555" stroke-width="1.2" fill="none" stroke-linecap="round" transform="translate(0,-90)"/>
