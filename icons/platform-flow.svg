<polyline points="540,150 570,197 598,197" stroke="#bbb" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
<polyline points="710,77 745,77 745,137 788,137" stroke="#bbb" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
<polyline points="730,197 745,197 745,137 788,137" stroke="#bbb" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
<line x1="910" y1="137" x2="958" y2="137" stroke="#bbb" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="1060" y1="137" x2="1108" y2="137" stroke="#bbb" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Bottom labels -->
<text x="95" y="290" font-family="Inter,Helvetica,Arial,sans-serif" font-size="10.5" fill="#999" text-anchor="middle" font-style="italic">Run on it</text>
<text x="175" y="290" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" fill="#ccc" text-anchor="middle">→</text>
<text x="275" y="290" font-family="Inter,Helvetica,Arial,sans-serif" font-size="10.5" fill="#999" text-anchor="middle" font-style="italic">Access it</text>
<text x="345" y="290" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" fill="#ccc" text-anchor="middle">→</text>
<text x="465" y="290" font-family="Inter,Helvetica,Arial,sans-serif" font-size="10.5" fill="#999" text-anchor="middle" font-style="italic">Ship to it</text>
<text x="545" y="290" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" fill="#ccc" text-anchor="middle">→</text>
<text x="655" y="290" font-family="Inter,Helvetica,Arial,sans-serif" font-size="10.5" fill="#999" text-anchor="middle" font-style="italic">Store / Stream</text>
<text x="735" y="290" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" fill="#ccc" text-anchor="middle">→</text>
<text x="850" y="290" font-family="Inter,Helvetica,Arial,sans-serif" font-size="10.5" fill="#999" text-anchor="middle" font-style="italic">Watch it</text>
<text x="930" y="290" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" fill="#ccc" text-anchor="middle">→</text>
<text x="1010" y="290" font-family="Inter,Helvetica,Arial,sans-serif" font-size="10.5" fill="#999" text-anchor="middle" font-style="italic">Protect it</text>
<text x="1080" y="290" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" fill="#ccc" text-anchor="middle">→</text>
<text x="1165" y="290" font-family="Inter,Helvetica,Arial,sans-serif" font-size="10.5" fill="#999" text-anchor="middle" font-style="italic">Govern it</text>
