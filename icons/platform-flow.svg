<!-- 3. Developer Productivity — rocket icon -->
<rect x="390" y="110" width="150" height="55" rx="8" stroke="#444" stroke-width="1.5" fill="#fafafa"/>
<path d="M465,68 L465,95 M458,88 L465,95 L472,88" stroke="#555" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="rotate(180,465,81)"/>
