<!-- 8. Governance — scales/balance icon -->
<rect x="1110" y="110" width="110" height="55" rx="8" stroke="#444" stroke-width="1.5" fill="#fafafa"/>
<line x1="1165" y1="70" x2="1165" y2="100" stroke="#555" stroke-width="1.2"/>
<line x1="1147" y1="78" x2="1183" y2="78" stroke="#555" stroke-width="1.2"/>
