<line x1="160" y1="137" x2="208" y2="137" stroke="#bbb" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="340" y1="137" x2="388" y2="137" stroke="#bbb" stroke-width="1.5" marker-end="url(#arr)"/>
